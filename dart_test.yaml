tags:
  live:
    description: >
      Tests under test/live that may need .env, network, or ODBC.
      Run `flutter test --exclude-tags=live` for a faster local/CI pass.
  benchmark:
    description: >
      Performance-style tests (ODBC RPC, socket transport, gzip, validation/mapping
      micro-benchmarks). Gated by env flags (e.g. ODBC_E2E_BENCHMARK,
      RPC_REQUEST_SCHEMA_BENCHMARK, CODEC_GZIP_BENCHMARK). Run `flutter test --tags benchmark`
      only when you intend to measure latency.
