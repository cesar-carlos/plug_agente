name: Update Appcast on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag (e.g. v1.4.0). Release must exist with PlugAgente-Setup-*.exe asset."
        required: false
        type: string
        default: ""
      rollout_percentage:
        description: "Rollout percentage for the new appcast item."
        required: false
        type: string
        default: "100"

jobs:
  update-appcast:
    runs-on: windows-latest
    env:
      MAX_APPCAST_ITEMS: "10"
    defaults:
      run:
        shell: bash
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      full_version: ${{ steps.release.outputs.full_version }}
      asset_url: ${{ steps.asset.outputs.url }}
      asset_name: ${{ steps.asset.outputs.name }}
      asset_size: ${{ steps.asset.outputs.size }}
      asset_sha256: ${{ steps.asset.outputs.sha256 }}
      rollout_percentage: ${{ steps.rollout.outputs.rollout_percentage }}
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run appcast tooling unit tests
        run: python3 -m unittest tool.test_appcast_manager tool.test_validate_release -v

      - name: Resolve rollout percentage
        id: rollout
        env:
          RAW_ROLLOUT_PERCENTAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.rollout_percentage || '100' }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys

          raw = (os.environ.get("RAW_ROLLOUT_PERCENTAGE") or "100").strip() or "100"
          try:
              value = int(raw)
          except ValueError:
              print(f"Error: rollout_percentage must be an integer from 0 to 100, got {raw!r}.", file=sys.stderr)
              sys.exit(1)
          if value < 0 or value > 100:
              print(f"Error: rollout_percentage must be from 0 to 100, got {value}.", file=sys.stderr)
              sys.exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"rollout_percentage={value}\n")
          PYEOF

      - name: Load release context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          python3 << 'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = (os.environ.get("TAG") or "").strip()
          if not tag:
              print("Error: could not resolve release tag (event or workflow input).", file=sys.stderr)
              sys.exit(1)
          raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/releases/tags/{tag}"],
              env={**os.environ},
              text=True,
          )
          data = json.loads(raw)
          body = data.get("body") or ""
          with open("release_body.txt", "w", encoding="utf-8") as f:
              f.write(body)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gf:
              gf.write(f"tag={data['tag_name']}\n")
              gf.write(f"release_id={data['id']}\n")
          PY

      - name: Upload release body for smoke job
        uses: actions/upload-artifact@v6
        with:
          name: release-body
          path: release_body.txt

      - name: Fetch release tag
        env:
          RELEASE_TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          git fetch origin tag "$TAG_NAME" 2>/dev/null || true

      - name: Get release info
        id: release
        env:
          RELEASE_TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          VERSION_SHORT="${TAG_NAME#v}"
          FULL_VERSION=$(git show "$TAG_NAME:pubspec.yaml" 2>/dev/null | grep -E '^\s*version:' | sed -E 's/^\s*version:\s*["]?([^"[:space:]]+)["]?.*/\1/' | tr -d ' \r' || true)
          if [ -z "$FULL_VERSION" ]; then
            echo "Error: Unable to resolve version from pubspec.yaml at tag $TAG_NAME"
            exit 1
          fi
          VERSION_FROM_PUBSPEC="${FULL_VERSION%%+*}"
          if [ "$VERSION_FROM_PUBSPEC" != "$VERSION_SHORT" ]; then
            echo "Error: Tag version ($VERSION_SHORT) does not match pubspec short version ($VERSION_FROM_PUBSPEC)"
            exit 1
          fi
          SETUP_VERSION=$(git show "$TAG_NAME:installer/setup.iss" 2>/dev/null | grep -E '^#define MyAppVersion ' | sed -E 's/^#define MyAppVersion\s+"([^"]+)".*/\1/' | tr -d ' \r' || true)
          if [ -z "$SETUP_VERSION" ]; then
            echo "Error: Unable to resolve installer/setup.iss MyAppVersion at tag $TAG_NAME"
            exit 1
          fi
          if [ "$SETUP_VERSION" != "$VERSION_SHORT" ]; then
            echo "Error: setup.iss version ($SETUP_VERSION) does not match tag version ($VERSION_SHORT)"
            exit 1
          fi
          {
            echo "tag=$TAG_NAME"
            echo "version=$VERSION_SHORT"
            echo "full_version=$FULL_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Get asset info
        id: asset
        env:
          ASSET_PATTERN: "PlugAgente-Setup-"
        run: |
          ASSET_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/${{ steps.ctx.outputs.release_id }}/assets")

          ASSET_CHOSEN=$(echo "$ASSET_RESPONSE" | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)
          exes = [a for a in assets if a['name'].endswith('.exe')]
          preferred = [a for a in exes if '${{ env.ASSET_PATTERN }}' in a['name']]
          chosen = (preferred or exes)[0] if (preferred or exes) else None
          if chosen:
              print(chosen['url'] + '|' + chosen['browser_download_url'] + '|' + str(chosen.get('size', '')) + '|' + chosen['name'])
          " 2>/dev/null || echo "")
          ASSET_API_URL=$(echo "$ASSET_CHOSEN" | cut -d'|' -f1)
          ASSET_URL=$(echo "$ASSET_CHOSEN" | cut -d'|' -f2)
          ASSET_SIZE=$(echo "$ASSET_CHOSEN" | cut -d'|' -f3)
          ASSET_NAME=$(echo "$ASSET_CHOSEN" | cut -d'|' -f4)

          if [ -z "$ASSET_URL" ] || [ -z "$ASSET_API_URL" ]; then
            echo "Error: No PlugAgente-Setup-*.exe asset found in release"
            exit 1
          fi

          ASSET_DOWNLOAD_PATH="release_asset_${ASSET_NAME}"
          curl -L -sS \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_API_URL" \
            -o "$ASSET_DOWNLOAD_PATH"
          ACTUAL_SIZE=$(python3 - "$ASSET_DOWNLOAD_PATH" << 'PYEOF'
          import os
          import sys
          print(os.path.getsize(sys.argv[1]))
          PYEOF
          )
          if [ "$ACTUAL_SIZE" != "$ASSET_SIZE" ]; then
            echo "Error: Downloaded asset size mismatch. expected=$ASSET_SIZE actual=$ACTUAL_SIZE"
            exit 1
          fi
          ASSET_SHA256=$(python3 - "$ASSET_DOWNLOAD_PATH" << 'PYEOF'
          import hashlib
          import sys
          h = hashlib.sha256()
          with open(sys.argv[1], "rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                  h.update(chunk)
          print(h.hexdigest())
          PYEOF
          )
          rm -f "$ASSET_DOWNLOAD_PATH"

          {
            echo "url=$ASSET_URL"
            echo "api_url=$ASSET_API_URL"
            echo "size=$ASSET_SIZE"
            echo "name=$ASSET_NAME"
            echo "sha256=$ASSET_SHA256"
          } >> "$GITHUB_OUTPUT"

      - name: Validate release consistency
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION_SHORT: ${{ steps.release.outputs.version }}
          FULL_VERSION: ${{ steps.release.outputs.full_version }}
          ASSET_URL: ${{ steps.asset.outputs.url }}
          ASSET_NAME: ${{ steps.asset.outputs.name }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys

          tag = os.environ.get("TAG_NAME", "").strip()
          version_short = os.environ.get("VERSION_SHORT", "").strip()
          full_version = os.environ.get("FULL_VERSION", "").strip()
          asset_url = os.environ.get("ASSET_URL", "").strip()
          asset_name = os.environ.get("ASSET_NAME", "").strip()

          expected_asset_name = f"PlugAgente-Setup-{version_short}.exe"
          expected_path = f"/releases/download/{tag}/"

          if not tag or not version_short or not full_version:
              print("Error: Missing tag/version metadata.")
              sys.exit(1)

          if asset_name != expected_asset_name:
              print(
                  "Error: Release asset name mismatch. "
                  f"expected={expected_asset_name!r}, actual={asset_name!r}"
              )
              sys.exit(1)

          if expected_path not in asset_url:
              print(
                  "Error: Release asset URL mismatch. "
                  f"expected path segment {expected_path!r}, actual URL={asset_url!r}"
              )
              sys.exit(1)

          print(
              "Release consistency validation passed "
              f"(tag={tag}, version={version_short}, full_version={full_version}, asset={asset_name})."
          )
          PYEOF

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Update appcast.xml
        env:
          MAX_APPCAST_ITEMS: ${{ env.MAX_APPCAST_ITEMS }}
        run: |
          python3 tool/appcast_manager.py update \
            --appcast appcast.xml \
            --version-short "${{ steps.release.outputs.version }}" \
            --full-version "${{ steps.release.outputs.full_version }}" \
            --asset-url "${{ steps.asset.outputs.url }}" \
            --asset-size "${{ steps.asset.outputs.size }}" \
            --asset-sha256 "${{ steps.asset.outputs.sha256 }}" \
            --asset-name "${{ steps.asset.outputs.name }}" \
            --channel "stable" \
            --rollout-percentage "${{ steps.rollout.outputs.rollout_percentage }}" \
            --release-body-file release_body.txt \
            --max-items "${MAX_APPCAST_ITEMS}"

      - name: Validate appcast.xml
        env:
          FULL_VERSION: ${{ steps.release.outputs.full_version }}
          MAX_APPCAST_ITEMS: ${{ env.MAX_APPCAST_ITEMS }}
          VERSION_SHORT: ${{ steps.release.outputs.version }}
        run: |
          python3 tool/appcast_manager.py validate-file \
            --appcast appcast.xml \
            --version-short "${VERSION_SHORT}" \
            --full-version "${FULL_VERSION}" \
            --asset-url "${{ steps.asset.outputs.url }}" \
            --asset-size "${{ steps.asset.outputs.size }}" \
            --asset-sha256 "${{ steps.asset.outputs.sha256 }}" \
            --asset-name "${{ steps.asset.outputs.name }}" \
            --channel "stable" \
            --rollout-percentage "${{ steps.rollout.outputs.rollout_percentage }}" \
            --release-body-file release_body.txt \
            --max-items "${MAX_APPCAST_ITEMS}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -B main origin/main
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Update appcast.xml for ${{ steps.release.outputs.tag }}"
          git push origin main

  deploy-pages:
    needs: update-appcast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout published appcast
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages-artifact
          cp appcast.xml pages-artifact/appcast.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-validate-appcast:
    needs:
      - update-appcast
      - deploy-pages
    runs-on: ubuntu-latest
    env:
      MAX_APPCAST_ITEMS: "10"
      OFFICIAL_FEED_URL: https://cesar-carlos.github.io/plug_agente/appcast.xml
      ROLLOUT_PERCENTAGE: ${{ needs.update-appcast.outputs.rollout_percentage }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download release body artifact
        uses: actions/download-artifact@v7
        with:
          name: release-body

      - name: Smoke validate published appcast feed
        env:
          ASSET_NAME: ${{ needs.update-appcast.outputs.asset_name }}
          ASSET_SHA256: ${{ needs.update-appcast.outputs.asset_sha256 }}
          ASSET_SIZE: ${{ needs.update-appcast.outputs.asset_size }}
          ASSET_URL: ${{ needs.update-appcast.outputs.asset_url }}
          FULL_VERSION: ${{ needs.update-appcast.outputs.full_version }}
          VERSION_SHORT: ${{ needs.update-appcast.outputs.version }}
        run: |
          python3 tool/appcast_manager.py smoke-validate-url \
            --feed-url "${OFFICIAL_FEED_URL}" \
            --version-short "${VERSION_SHORT}" \
            --full-version "${FULL_VERSION}" \
            --asset-url "${ASSET_URL}" \
            --asset-size "${ASSET_SIZE}" \
            --asset-sha256 "${ASSET_SHA256}" \
            --asset-name "${ASSET_NAME}" \
            --channel "stable" \
            --rollout-percentage "${ROLLOUT_PERCENTAGE}" \
            --release-body-file release_body.txt \
            --max-items "${MAX_APPCAST_ITEMS}" \
            --attempts 6 \
            --delay-seconds 5
