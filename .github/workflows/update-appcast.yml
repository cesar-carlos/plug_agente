name: Update Appcast on Release

on:
  release:
    types: [published]

jobs:
  update-appcast:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Fetch release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          git fetch origin tag "$TAG_NAME" 2>/dev/null || true

      - name: Get release info
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          VERSION_SHORT="${TAG_NAME#v}"
          FULL_VERSION=$(git show "$TAG_NAME:pubspec.yaml" 2>/dev/null | grep -E '^\s*version:' | sed -E 's/^\s*version:\s*["]?([^"[:space:]]+)["]?.*/\1/' | tr -d ' \r' || echo "$VERSION_SHORT")
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION_SHORT" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get asset info
        id: asset
        env:
          ASSET_PATTERN: "PlugAgente-Setup-"
        run: |
          ASSET_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/${{ github.event.release.id }}/assets")

          ASSET_CHOSEN=$(echo "$ASSET_RESPONSE" | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)
          exes = [a for a in assets if a['name'].endswith('.exe')]
          preferred = [a for a in exes if '${{ env.ASSET_PATTERN }}' in a['name']]
          chosen = (preferred or exes)[0] if (preferred or exes) else None
          if chosen:
              print(chosen['url'] + '|' + chosen['browser_download_url'] + '|' + str(chosen.get('size', '')))
          " 2>/dev/null || echo "")
          ASSET_API_URL=$(echo "$ASSET_CHOSEN" | cut -d'|' -f1)
          ASSET_URL=$(echo "$ASSET_CHOSEN" | cut -d'|' -f2)
          ASSET_SIZE=$(echo "$ASSET_CHOSEN" | cut -d'|' -f3)

          if [ -z "$ASSET_URL" ] || [ -z "$ASSET_API_URL" ]; then
            echo "Error: No PlugAgente-Setup-*.exe asset found in release"
            exit 1
          fi

          echo "url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "api_url=$ASSET_API_URL" >> $GITHUB_OUTPUT
          echo "size=$ASSET_SIZE" >> $GITHUB_OUTPUT

      - name: Install cryptography library
        run: pip install cryptography

      - name: Sign update
        id: sign
        env:
          DSA_PRIVATE_KEY: ${{ secrets.DSA_PRIVATE_KEY }}
        run: |
          if [ -z "$DSA_PRIVATE_KEY" ]; then
            echo "signature=" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Save private key to file
          printf '%s\n' "$DSA_PRIVATE_KEY" > dsa_priv.pem

          # Download the setup.exe
          curl -sL -H "Accept: application/octet-stream" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -o setup.exe "${{ steps.asset.outputs.api_url }}"
          DOWNLOAD_SIZE=$(wc -c < setup.exe)
          echo "Downloaded setup.exe: $DOWNLOAD_SIZE bytes"
          if [ "$DOWNLOAD_SIZE" -lt 1000000 ]; then
            echo "Error: Download too small, likely failed. First 500 chars:"
            head -c 500 setup.exe | cat -v
            exit 1
          fi

          # Sign using Python with cryptography library
          SIG=$(python3 << 'PYEOF'
          from cryptography.hazmat.primitives import hashes
          from cryptography.hazmat.primitives.asymmetric import dsa
          from cryptography.hazmat.primitives import serialization
          import base64
          import sys

          try:
              # Read DSA private key from PEM file
              with open('dsa_priv.pem', 'rb') as f:
                  private_key = serialization.load_pem_private_key(
                      f.read(),
                      password=None
                  )

              # Read setup.exe content
              with open('setup.exe', 'rb') as f:
                  data = f.read()

              # Sign the data
              signature = private_key.sign(data, hashes.SHA1())

              # Base64 encode the signature
              sig_b64 = base64.b64encode(signature).decode('utf-8')
              print(sig_b64)
          except Exception as e:
              print(f"Error: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          )

          if [ $? -ne 0 ]; then
            echo "Error: Failed to sign update"
            exit 1
          fi

          echo "Extracted signature length: ${#SIG}"
          echo "signature=${SIG}" >> $GITHUB_OUTPUT
          rm -f dsa_priv.pem setup.exe

      - name: Enforce signature policy
        id: signature_policy
        env:
          DSA_PRIVATE_KEY: ${{ secrets.DSA_PRIVATE_KEY }}
          DSA_SIGNATURE: ${{ steps.sign.outputs.signature }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys

          prerelease = os.environ.get("RELEASE_PRERELEASE", "false").strip().lower() == "true"
          has_private_key = bool(os.environ.get("DSA_PRIVATE_KEY", "").strip())
          has_signature = bool(os.environ.get("DSA_SIGNATURE", "").strip())
          signature_required = not prerelease

          if signature_required and not has_private_key:
              print("Error: DSA_PRIVATE_KEY is required for production (non-pre-release) releases.")
              sys.exit(1)

          if signature_required and not has_signature:
              print("Error: Failed to generate DSA signature for production release.")
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"required={'true' if signature_required else 'false'}\n")

          print(
              "Signature policy: "
              f"required={signature_required}, "
              f"has_private_key={has_private_key}, "
              f"has_signature={has_signature}"
          )
          PYEOF

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Update appcast.xml
        env:
          DSA_SIGNATURE: ${{ steps.sign.outputs.signature }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python3 << PYEOF
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          import os
          import sys
          import html

          TAG_NAME = "${{ steps.release.outputs.tag }}"
          VERSION_SHORT = "${{ steps.release.outputs.version }}"
          FULL_VERSION = "${{ steps.release.outputs.full_version }}"
          VERSION = FULL_VERSION if FULL_VERSION else VERSION_SHORT
          ASSET_URL = "${{ steps.asset.outputs.url }}"
          ASSET_SIZE = "${{ steps.asset.outputs.size }}"
          DSA_SIGNATURE = os.environ.get("DSA_SIGNATURE", "").strip()
          RELEASE_BODY = (os.environ.get("RELEASE_BODY") or "").strip()

          if not ASSET_URL or not ASSET_SIZE:
              print("Error: Asset URL or size not found")
              sys.exit(1)

          SPARKLE_NS = "http://www.andymatuschak.org/xml-namespaces/sparkle"

          if os.path.exists("appcast.xml"):
              tree = ET.parse("appcast.xml")
              root = tree.getroot()
              channel = root.find("channel")
              for item in list(channel.findall("item")):
                  enclosure = item.find("enclosure")
                  if enclosure is not None:
                      sparkle_version = enclosure.get(f"{{{SPARKLE_NS}}}version") or enclosure.get("sparkle:version")
                      if sparkle_version in (VERSION, VERSION_SHORT):
                          channel.remove(item)
          else:
              root = ET.Element("rss")
              root.set("version", "2.0")
              root.set("xmlns:sparkle", SPARKLE_NS)
              channel = ET.SubElement(root, "channel")
              ET.SubElement(channel, "title").text = "Plug Agente Updates"
              ET.SubElement(channel, "link").text = "https://github.com/cesar-carlos/plug_agente/releases"
              ET.SubElement(channel, "description").text = "Atualizações do Plug Agente"

          ET.register_namespace("sparkle", SPARKLE_NS)

          item = ET.Element("item")
          ET.SubElement(item, "title").text = f"Version {VERSION}"
          ET.SubElement(item, "pubDate").text = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
          desc = ET.SubElement(item, "description")
          if RELEASE_BODY:
              desc.text = html.escape(RELEASE_BODY[:2000])
          else:
              desc.text = f"Nova Versão {VERSION} - Atualização automática via GitHub Release."

          enclosure = ET.SubElement(item, "enclosure")
          enclosure.set("url", ASSET_URL)
          enclosure.set(f"{{{SPARKLE_NS}}}version", VERSION)
          enclosure.set(f"{{{SPARKLE_NS}}}os", "windows")
          enclosure.set("length", str(ASSET_SIZE))
          enclosure.set("type", "application/octet-stream")
          if DSA_SIGNATURE:
              enclosure.set(f"{{{SPARKLE_NS}}}dsaSignature", DSA_SIGNATURE)

          channel.insert(0, item)

          items = [c for c in channel if c.tag == "item"]
          title_el = channel.find("title")
          link_el = channel.find("link")
          desc_el = channel.find("description")
          for child in list(channel):
              channel.remove(child)
          if title_el is not None:
              channel.append(title_el)
          else:
              el = ET.SubElement(channel, "title")
              el.text = "Plug Agente Updates"
          if link_el is not None:
              channel.append(link_el)
          else:
              el = ET.SubElement(channel, "link")
              el.text = "https://github.com/cesar-carlos/plug_agente/releases"
          if desc_el is not None:
              channel.append(desc_el)
          else:
              el = ET.SubElement(channel, "description")
              el.text = "Atualizações do Plug Agente"
          for i in items:
              channel.append(i)

          tree = ET.ElementTree(root)
          ET.indent(tree, space=" ")
          with open("appcast.xml", "wb") as f:
              f.write(b'<?xml version="1.0" encoding="UTF-8"?>\n')
              tree.write(f, encoding="utf-8")

          print(f"Successfully updated appcast.xml with version {VERSION}" + (" (with DSA signature)" if DSA_SIGNATURE else ""))
          PYEOF

      - name: Validate appcast.xml
        env:
          FULL_VERSION: ${{ steps.release.outputs.full_version }}
          VERSION_SHORT: ${{ steps.release.outputs.version }}
          DSA_REQUIRED: ${{ steps.signature_policy.outputs.required }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          import xml.etree.ElementTree as ET

          version = (os.environ.get("FULL_VERSION") or os.environ.get("VERSION_SHORT", "")).strip()
          dsa_required = os.environ.get("DSA_REQUIRED", "false").strip().lower() == "true"
          sparkle_ns = "http://www.andymatuschak.org/xml-namespaces/sparkle"

          tree = ET.parse("appcast.xml")
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              print("Error: appcast.xml missing <channel>.")
              sys.exit(1)

          matched_item = None
          matched_enclosure = None
          for item in channel.findall("item"):
              enclosure = item.find("enclosure")
              if enclosure is None:
                  continue
              sparkle_version = enclosure.get(f"{{{sparkle_ns}}}version") or enclosure.get("sparkle:version")
              if sparkle_version == version:
                  matched_item = item
                  matched_enclosure = enclosure
                  break

          if matched_item is None or matched_enclosure is None:
              print(f"Error: appcast.xml missing item for version {version}.")
              sys.exit(1)

          url = (matched_enclosure.get("url") or "").strip()
          length = (matched_enclosure.get("length") or "").strip()
          mime_type = (matched_enclosure.get("type") or "").strip()
          os_name = (
              matched_enclosure.get(f"{{{sparkle_ns}}}os")
              or matched_enclosure.get("sparkle:os")
              or ""
          ).strip()
          dsa_signature = (
              matched_enclosure.get(f"{{{sparkle_ns}}}dsaSignature")
              or matched_enclosure.get("sparkle:dsaSignature")
              or ""
          ).strip()

          if not (url.startswith("https://") and url.lower().endswith(".exe")):
              print(f"Error: invalid enclosure url: {url!r}")
              sys.exit(1)

          try:
              if int(length) <= 0:
                  raise ValueError
          except ValueError:
              print(f"Error: invalid enclosure length: {length!r}")
              sys.exit(1)

          if mime_type != "application/octet-stream":
              print(f"Error: invalid enclosure type: {mime_type!r}")
              sys.exit(1)

          if os_name != "windows":
              print(f"Error: invalid sparkle:os value: {os_name!r}")
              sys.exit(1)

          if dsa_required and not dsa_signature:
              print("Error: missing sparkle:dsaSignature for production release.")
              sys.exit(1)

          print(
              "appcast.xml validation passed "
              f"(version={version}, dsa_required={dsa_required}, signature_present={bool(dsa_signature)})"
          )
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -B main origin/main
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Update appcast.xml for ${{ steps.release.outputs.tag }}"
          git push origin main
