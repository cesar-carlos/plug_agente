name: Update Appcast on Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag (e.g. v1.4.0). Release must exist with PlugAgente-Setup-*.exe asset."
        required: false
        type: string
        default: ""

jobs:
  update-appcast:
    runs-on: windows-latest
    env:
      MAX_APPCAST_ITEMS: "10"
    defaults:
      run:
        shell: bash
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      full_version: ${{ steps.release.outputs.full_version }}
      asset_url: ${{ steps.asset.outputs.url }}
      asset_name: ${{ steps.asset.outputs.name }}
      asset_size: ${{ steps.asset.outputs.size }}
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Load release context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          python3 << 'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = (os.environ.get("TAG") or "").strip()
          if not tag:
              print("Error: could not resolve release tag (event or workflow input).", file=sys.stderr)
              sys.exit(1)
          raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/releases/tags/{tag}"],
              env={**os.environ},
              text=True,
          )
          data = json.loads(raw)
          body = data.get("body") or ""
          with open("release_body.txt", "w", encoding="utf-8") as f:
              f.write(body)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gf:
              gf.write(f"tag={data['tag_name']}\n")
              gf.write(f"release_id={data['id']}\n")
          PY

      - name: Upload release body for smoke job
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: release_body.txt

      - name: Fetch release tag
        env:
          RELEASE_TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          git fetch origin tag "$TAG_NAME" 2>/dev/null || true

      - name: Get release info
        id: release
        env:
          RELEASE_TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          TAG_NAME="${RELEASE_TAG:-${GITHUB_REF#refs/tags/}}"
          VERSION_SHORT="${TAG_NAME#v}"
          FULL_VERSION=$(git show "$TAG_NAME:pubspec.yaml" 2>/dev/null | grep -E '^\s*version:' | sed -E 's/^\s*version:\s*["]?([^"[:space:]]+)["]?.*/\1/' | tr -d ' \r' || true)
          if [ -z "$FULL_VERSION" ]; then
            echo "Error: Unable to resolve version from pubspec.yaml at tag $TAG_NAME"
            exit 1
          fi
          VERSION_FROM_PUBSPEC="${FULL_VERSION%%+*}"
          if [ "$VERSION_FROM_PUBSPEC" != "$VERSION_SHORT" ]; then
            echo "Error: Tag version ($VERSION_SHORT) does not match pubspec short version ($VERSION_FROM_PUBSPEC)"
            exit 1
          fi
          SETUP_VERSION=$(git show "$TAG_NAME:installer/setup.iss" 2>/dev/null | grep -E '^#define MyAppVersion ' | sed -E 's/^#define MyAppVersion\s+"([^"]+)".*/\1/' | tr -d ' \r' || true)
          if [ -z "$SETUP_VERSION" ]; then
            echo "Error: Unable to resolve installer/setup.iss MyAppVersion at tag $TAG_NAME"
            exit 1
          fi
          if [ "$SETUP_VERSION" != "$VERSION_SHORT" ]; then
            echo "Error: setup.iss version ($SETUP_VERSION) does not match tag version ($VERSION_SHORT)"
            exit 1
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION_SHORT" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get asset info
        id: asset
        env:
          ASSET_PATTERN: "PlugAgente-Setup-"
        run: |
          ASSET_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/${{ steps.ctx.outputs.release_id }}/assets")

          ASSET_CHOSEN=$(echo "$ASSET_RESPONSE" | python3 -c "
          import sys, json
          assets = json.load(sys.stdin)
          exes = [a for a in assets if a['name'].endswith('.exe')]
          preferred = [a for a in exes if '${{ env.ASSET_PATTERN }}' in a['name']]
          chosen = (preferred or exes)[0] if (preferred or exes) else None
          if chosen:
              print(chosen['url'] + '|' + chosen['browser_download_url'] + '|' + str(chosen.get('size', '')) + '|' + chosen['name'])
          " 2>/dev/null || echo "")
          ASSET_API_URL=$(echo "$ASSET_CHOSEN" | cut -d'|' -f1)
          ASSET_URL=$(echo "$ASSET_CHOSEN" | cut -d'|' -f2)
          ASSET_SIZE=$(echo "$ASSET_CHOSEN" | cut -d'|' -f3)
          ASSET_NAME=$(echo "$ASSET_CHOSEN" | cut -d'|' -f4)

          if [ -z "$ASSET_URL" ] || [ -z "$ASSET_API_URL" ]; then
            echo "Error: No PlugAgente-Setup-*.exe asset found in release"
            exit 1
          fi

          echo "url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "api_url=$ASSET_API_URL" >> $GITHUB_OUTPUT
          echo "size=$ASSET_SIZE" >> $GITHUB_OUTPUT
          echo "name=$ASSET_NAME" >> $GITHUB_OUTPUT

      - name: Validate release consistency
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
          VERSION_SHORT: ${{ steps.release.outputs.version }}
          FULL_VERSION: ${{ steps.release.outputs.full_version }}
          ASSET_URL: ${{ steps.asset.outputs.url }}
          ASSET_NAME: ${{ steps.asset.outputs.name }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys

          tag = os.environ.get("TAG_NAME", "").strip()
          version_short = os.environ.get("VERSION_SHORT", "").strip()
          full_version = os.environ.get("FULL_VERSION", "").strip()
          asset_url = os.environ.get("ASSET_URL", "").strip()
          asset_name = os.environ.get("ASSET_NAME", "").strip()

          expected_asset_name = f"PlugAgente-Setup-{version_short}.exe"
          expected_path = f"/releases/download/{tag}/"

          if not tag or not version_short or not full_version:
              print("Error: Missing tag/version metadata.")
              sys.exit(1)

          if asset_name != expected_asset_name:
              print(
                  "Error: Release asset name mismatch. "
                  f"expected={expected_asset_name!r}, actual={asset_name!r}"
              )
              sys.exit(1)

          if expected_path not in asset_url:
              print(
                  "Error: Release asset URL mismatch. "
                  f"expected path segment {expected_path!r}, actual URL={asset_url!r}"
              )
              sys.exit(1)

          print(
              "Release consistency validation passed "
              f"(tag={tag}, version={version_short}, full_version={full_version}, asset={asset_name})."
          )
          PYEOF

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Update appcast.xml
        env:
          MAX_APPCAST_ITEMS: ${{ env.MAX_APPCAST_ITEMS }}
        run: |
          python3 << PYEOF
          import re
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          import os
          import sys
          from xml.sax.saxutils import escape

          def appcast_description_body(raw: str, max_len: int = 2000) -> str:
              """Release notes as safe XML character data (Sparkle/RSS description)."""
              cleaned = re.sub(r"[\x00-\x08\x0B\x0C\x0E-\x1F]", "", raw)
              return escape(cleaned[:max_len])

          TAG_NAME = "${{ steps.release.outputs.tag }}"
          VERSION_SHORT = "${{ steps.release.outputs.version }}"
          FULL_VERSION = "${{ steps.release.outputs.full_version }}"
          VERSION = FULL_VERSION if FULL_VERSION else VERSION_SHORT
          ASSET_URL = "${{ steps.asset.outputs.url }}"
          ASSET_SIZE = "${{ steps.asset.outputs.size }}"
          MAX_APPCAST_ITEMS = int(os.environ.get("MAX_APPCAST_ITEMS", "10"))
          with open("release_body.txt", encoding="utf-8") as _bf:
              RELEASE_BODY = _bf.read().strip()

          if not ASSET_URL or not ASSET_SIZE:
              print("Error: Asset URL or size not found")
              sys.exit(1)

          SPARKLE_NS = "http://www.andymatuschak.org/xml-namespaces/sparkle"

          if os.path.exists("appcast.xml"):
              tree = ET.parse("appcast.xml")
              root = tree.getroot()
              channel = root.find("channel")
              for item in list(channel.findall("item")):
                  enclosure = item.find("enclosure")
                  if enclosure is not None:
                      sparkle_version = enclosure.get(f"{{{SPARKLE_NS}}}version") or enclosure.get("sparkle:version")
                      if sparkle_version in (VERSION, VERSION_SHORT):
                          channel.remove(item)
          else:
              root = ET.Element("rss")
              root.set("version", "2.0")
              root.set("xmlns:sparkle", SPARKLE_NS)
              channel = ET.SubElement(root, "channel")
              ET.SubElement(channel, "title").text = "Plug Agente Updates"
              ET.SubElement(channel, "link").text = "https://github.com/cesar-carlos/plug_agente/releases"
              ET.SubElement(channel, "description").text = "Atualizações do Plug Agente"

          ET.register_namespace("sparkle", SPARKLE_NS)

          item = ET.Element("item")
          ET.SubElement(item, "title").text = f"Version {VERSION}"
          ET.SubElement(item, "pubDate").text = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
          desc = ET.SubElement(item, "description")
          if RELEASE_BODY:
              desc.text = appcast_description_body(RELEASE_BODY)
          else:
              desc.text = f"Nova Versão {VERSION} - Atualização automática via GitHub Release."

          enclosure = ET.SubElement(item, "enclosure")
          enclosure.set("url", ASSET_URL)
          enclosure.set(f"{{{SPARKLE_NS}}}version", VERSION)
          enclosure.set(f"{{{SPARKLE_NS}}}os", "windows")
          enclosure.set("length", str(ASSET_SIZE))
          enclosure.set("type", "application/octet-stream")

          channel.insert(0, item)

          items = [c for c in channel if c.tag == "item"]
          items = items[:MAX_APPCAST_ITEMS]
          title_el = channel.find("title")
          link_el = channel.find("link")
          desc_el = channel.find("description")
          for child in list(channel):
              channel.remove(child)
          if title_el is not None:
              channel.append(title_el)
          else:
              el = ET.SubElement(channel, "title")
              el.text = "Plug Agente Updates"
          if link_el is not None:
              channel.append(link_el)
          else:
              el = ET.SubElement(channel, "link")
              el.text = "https://github.com/cesar-carlos/plug_agente/releases"
          if desc_el is not None:
              channel.append(desc_el)
          else:
              el = ET.SubElement(channel, "description")
              el.text = "Atualizações do Plug Agente"
          for i in items:
              channel.append(i)

          tree = ET.ElementTree(root)
          ET.indent(tree, space=" ")
          with open("appcast.xml", "wb") as f:
              f.write(b'<?xml version="1.0" encoding="UTF-8"?>\n')
              tree.write(f, encoding="utf-8")

          print(f"Successfully updated appcast.xml with version {VERSION}")
          PYEOF

      - name: Validate appcast.xml
        env:
          FULL_VERSION: ${{ steps.release.outputs.full_version }}
          MAX_APPCAST_ITEMS: ${{ env.MAX_APPCAST_ITEMS }}
          VERSION_SHORT: ${{ steps.release.outputs.version }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          import xml.etree.ElementTree as ET

          version = (os.environ.get("FULL_VERSION") or os.environ.get("VERSION_SHORT", "")).strip()
          max_items = int(os.environ.get("MAX_APPCAST_ITEMS", "10"))
          sparkle_ns = "http://www.andymatuschak.org/xml-namespaces/sparkle"

          tree = ET.parse("appcast.xml")
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              print("Error: appcast.xml missing <channel>.")
              sys.exit(1)

          matched_item = None
          matched_enclosure = None
          for item in channel.findall("item"):
              enclosure = item.find("enclosure")
              if enclosure is None:
                  continue
              sparkle_version = enclosure.get(f"{{{sparkle_ns}}}version") or enclosure.get("sparkle:version")
              if sparkle_version == version:
                  matched_item = item
                  matched_enclosure = enclosure
                  break

          if matched_item is None or matched_enclosure is None:
              print(f"Error: appcast.xml missing item for version {version}.")
              sys.exit(1)

          url = (matched_enclosure.get("url") or "").strip()
          length = (matched_enclosure.get("length") or "").strip()
          mime_type = (matched_enclosure.get("type") or "").strip()
          os_name = (
              matched_enclosure.get(f"{{{sparkle_ns}}}os")
              or matched_enclosure.get("sparkle:os")
              or ""
          ).strip()

          if not (url.startswith("https://") and url.lower().endswith(".exe")):
              print(f"Error: invalid enclosure url: {url!r}")
              sys.exit(1)

          try:
              if int(length) <= 0:
                  raise ValueError
          except ValueError:
              print(f"Error: invalid enclosure length: {length!r}")
              sys.exit(1)

          if mime_type != "application/octet-stream":
              print(f"Error: invalid enclosure type: {mime_type!r}")
              sys.exit(1)

          if os_name != "windows":
              print(f"Error: invalid sparkle:os value: {os_name!r}")
              sys.exit(1)

          item_count = len(channel.findall("item"))
          if item_count < 1 or item_count > max_items:
              print(
                  f"Error: invalid item count in appcast.xml: {item_count} "
                  f"(expected between 1 and {max_items})."
              )
              sys.exit(1)

          print(
              "appcast.xml validation passed "
              f"(version={version}, item_count={item_count})"
          )
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main || git checkout -B main origin/main
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Update appcast.xml for ${{ steps.release.outputs.tag }}"
          git push origin main

  smoke-validate-appcast:
    needs: update-appcast
    runs-on: ubuntu-latest
    env:
      MAX_APPCAST_ITEMS: "10"
      OFFICIAL_FEED_URL: https://raw.githubusercontent.com/cesar-carlos/plug_agente/main/appcast.xml
    permissions:
      contents: read
      actions: read
    steps:
      - name: Download release body artifact
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Smoke validate published appcast feed
        env:
          ASSET_NAME: ${{ needs.update-appcast.outputs.asset_name }}
          ASSET_SIZE: ${{ needs.update-appcast.outputs.asset_size }}
          ASSET_URL: ${{ needs.update-appcast.outputs.asset_url }}
          FULL_VERSION: ${{ needs.update-appcast.outputs.full_version }}
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import sys
          import time
          import urllib.request
          import xml.etree.ElementTree as ET
          def sanitize_release_notes(raw: str, max_len: int = 2000) -> str:
              cleaned = re.sub(r"[\x00-\x08\x0B\x0C\x0E-\x1F]", "", raw)
              return cleaned[:max_len]

          feed_url = os.environ["OFFICIAL_FEED_URL"].strip()
          full_version = os.environ["FULL_VERSION"].strip()
          asset_url = os.environ["ASSET_URL"].strip()
          asset_name = os.environ["ASSET_NAME"].strip()
          asset_size = os.environ["ASSET_SIZE"].strip()
          with open("release_body.txt", encoding="utf-8") as _bf:
              release_body = _bf.read().strip()
          max_items = int(os.environ.get("MAX_APPCAST_ITEMS", "10"))
          sparkle_ns = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          expected_description = (
              sanitize_release_notes(release_body)
              if release_body
              else f"Nova Versão {full_version} - Atualização automática via GitHub Release."
          )
          expected_title = f"Version {full_version}"

          last_error = None
          for attempt in range(1, 7):
              request = urllib.request.Request(
                  f"{feed_url}?cb={int(time.time())}",
                  headers={"Cache-Control": "no-cache", "Pragma": "no-cache"},
              )
              try:
                  with urllib.request.urlopen(request, timeout=15) as response:
                      body = response.read()
                  root = ET.fromstring(body)
                  channel = root.find("channel")
                  if channel is None:
                      raise ValueError("missing <channel>")

                  items = channel.findall("item")
                  if not items:
                      raise ValueError("missing <item>")
                  if len(items) > max_items:
                      raise ValueError(
                          f"item count {len(items)} exceeds limit {max_items}"
                      )

                  latest_item = items[0]
                  title = (latest_item.findtext("title") or "").strip()
                  description = (latest_item.findtext("description") or "").strip()
                  enclosure = latest_item.find("enclosure")
                  if enclosure is None:
                      raise ValueError("missing <enclosure> in latest item")

                  version = (
                      enclosure.get(f"{{{sparkle_ns}}}version")
                      or enclosure.get("sparkle:version")
                      or ""
                  ).strip()
                  latest_url = (enclosure.get("url") or "").strip()
                  latest_size = (enclosure.get("length") or "").strip()

                  if title != expected_title:
                      raise ValueError(
                          f"unexpected title {title!r}, expected {expected_title!r}"
                      )
                  if description != expected_description:
                      raise ValueError("latest item description does not match release body")
                  if version != full_version:
                      raise ValueError(
                          f"unexpected version {version!r}, expected {full_version!r}"
                      )
                  if latest_url != asset_url:
                      raise ValueError("latest enclosure URL does not match release asset URL")
                  if latest_size != asset_size:
                      raise ValueError("latest enclosure length does not match release asset size")
                  if asset_name not in latest_url:
                      raise ValueError("latest enclosure URL does not include expected asset name")

                  print(
                      "Published appcast smoke validation passed "
                      f"(version={version}, items={len(items)}, feed={feed_url})."
                  )
                  sys.exit(0)
              except Exception as error:
                  last_error = error
                  if attempt < 6:
                      print(
                          f"Attempt {attempt}/6 failed while checking published appcast: {error}. "
                          "Retrying in 5 seconds..."
                      )
                      time.sleep(5)

          print(f"Error: published appcast smoke validation failed: {last_error}")
          sys.exit(1)
          PYEOF
