name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: E2E env check (informational)
        run: dart run tool/check_e2e_env.dart

      - name: Analyze
        run: flutter analyze

      - name: Test with coverage (exclude live tag)
        run: flutter test --coverage --exclude-tags=live

      - name: Coverage gate (lib/domain + lib/application)
        run: dart run tool/check_coverage_gate.dart

      - name: Test live tag (skips without secrets)
        run: flutter test --tags=live
