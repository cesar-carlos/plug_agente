name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  github-actions-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows
        run: '"$HOME/go/bin/actionlint"'

  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Installer setup script test
        run: flutter test test/installer/setup_script_test.dart

  appcast-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate appcast tooling
        run: python3 -m unittest tool.test_appcast_manager tool.test_validate_release -v

  windows-helper-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows debug bundle
        run: flutter build windows --debug

      - name: Smoke native update helper
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $PWD "build\windows\x64\runner"
          $helperFile = Get-ChildItem -Path $bundleRoot -Filter "plug_update_helper.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $helperFile) {
            throw "plug_update_helper.exe was not found in the Windows debug bundle."
          }
          $helper = $helperFile.FullName

          $status = Join-Path $env:RUNNER_TEMP "plug_update_helper_invalid_args_status.json"
          if (Test-Path $status) {
            Remove-Item $status -Force
          }

          $process = Start-Process -FilePath $helper -ArgumentList @("--status", $status) -Wait -PassThru -WindowStyle Hidden
          $exitCode = $process.ExitCode
          if ($exitCode -ne 2) {
            throw "Expected helper exit code 2 for invalid arguments, got $exitCode."
          }
          if (!(Test-Path $status)) {
            throw "Expected helper to write a status JSON for invalid arguments."
          }

          $json = Get-Content $status -Raw | ConvertFrom-Json
          if ($json.state -ne "launcherFailed") {
            throw "Expected launcherFailed state, got $($json.state)."
          }
          if ([string]::IsNullOrWhiteSpace($json.errorMessage)) {
            throw "Expected helper status to include an errorMessage."
          }

  transport-benchmark:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run transport benchmark test
        run: |
          mkdir -p benchmark-artifacts
          flutter test test/infrastructure/codecs/transport_pipeline_benchmark_test.dart --reporter expanded > benchmark-artifacts/transport-benchmark.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: transport-benchmark
          path: benchmark-artifacts/transport-benchmark.txt

  live-hub-e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Hub Socket.IO live E2E
        env:
          RUN_LIVE_HUB_TESTS: true
          E2E_HUB_URL: ${{ secrets.E2E_HUB_URL }}
          E2E_HUB_TOKEN: ${{ secrets.E2E_HUB_TOKEN }}
        run: flutter test test/integration/hub_socket_live_e2e_test.dart
