name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  github-actions-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint workflows
        run: '"$HOME/go/bin/actionlint"'

  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Install elevated runner dependencies
        working-directory: tool/plug_agente_elevated_runner
        run: dart pub get

      - name: Analyze elevated runner
        working-directory: tool/plug_agente_elevated_runner
        run: dart analyze

      # Live ODBC/Hub E2E tests use tags live|slow|perf and are local-only
      # (see docs/testing/e2e_setup.md). CI must not run them on GitHub runners.
      - name: Test
        run: flutter test --exclude-tags "live || slow || perf"

      - name: Agent actions production preflight
        run: dart run tool/preflight_agent_actions_production.dart

      - name: Agent actions homologation gate
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t contract_paths < <(grep -v '^\s*#' tool/agent_actions_contract_test_paths.txt | grep -v '^\s*$')
          mapfile -t ui_paths < <(grep -v '^\s*#' tool/agent_actions_ui_test_paths.txt | grep -v '^\s*$')
          flutter test "${contract_paths[@]}"
          flutter test "${ui_paths[@]}"

      - name: Installer setup script test
        run: flutter test test/installer/setup_script_test.dart

  appcast-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate appcast tooling
        run: python3 -m unittest tool.test_appcast_manager tool.test_validate_release -v

      - name: Validate benchmark tooling
        run: |
          python3 -m unittest \
            tool.tests.test_run_benchmark_suite \
            tool.tests.test_compare_benchmark_summary \
            tool.tests.test_benchmark_migrate \
            tool.tests.test_promote_benchmark_baseline \
            tool.tests.test_benchmark_evolution_report \
            -v

  windows-helper-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows debug bundle
        run: flutter build windows --debug

      - name: Smoke native update helper
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP "windows-helper-smoke"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $manifest = Join-Path $artifactDir "manifest.txt"
          $bundleRoot = Join-Path $PWD "build\windows\x64\runner"
          "bundleRoot=$bundleRoot" | Out-File -FilePath $manifest -Encoding utf8
          $helperFile = Get-ChildItem -Path $bundleRoot -Filter "plug_update_helper.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $helperFile) {
            throw "plug_update_helper.exe was not found in the Windows debug bundle."
          }
          $helper = $helperFile.FullName
          "helper=$helper" | Out-File -FilePath $manifest -Append -Encoding utf8

          $status = Join-Path $artifactDir "plug_update_helper_invalid_args_status.json"
          if (Test-Path $status) {
            Remove-Item $status -Force
          }

          $stdout = Join-Path $artifactDir "helper_stdout.txt"
          $stderr = Join-Path $artifactDir "helper_stderr.txt"
          $process = Start-Process -FilePath $helper -ArgumentList @("--status", $status) -Wait -PassThru -WindowStyle Hidden -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          $exitCode = $process.ExitCode
          "exitCode=$exitCode" | Out-File -FilePath $manifest -Append -Encoding utf8
          if ($exitCode -ne 2) {
            throw "Expected helper exit code 2 for invalid arguments, got $exitCode."
          }
          if (!(Test-Path $status)) {
            throw "Expected helper to write a status JSON for invalid arguments."
          }

          $json = Get-Content $status -Raw | ConvertFrom-Json
          if ($json.state -ne "launcherFailed") {
            throw "Expected launcherFailed state, got $($json.state)."
          }
          if ([string]::IsNullOrWhiteSpace($json.errorMessage)) {
            throw "Expected helper status to include an errorMessage."
          }

      - name: Upload helper smoke diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: windows-helper-smoke-diagnostics
          path: ${{ runner.temp }}\windows-helper-smoke\*
          if-no-files-found: ignore

      - name: Build elevated action runner helper
        shell: pwsh
        run: python tool/build_elevated_runner.py

      - name: Smoke elevated action runner helper
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP "elevated-helper-smoke"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $bundleRoot = Join-Path $PWD "build\windows\x64\runner"
          $helperFile = Get-ChildItem -Path $bundleRoot -Filter "plug_agente_elevated_runner.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $helperFile) {
            throw "plug_agente_elevated_runner.exe was not found in the Windows debug bundle."
          }
          $helper = $helperFile.FullName
          $process = Start-Process -FilePath $helper -ArgumentList @() -Wait -PassThru -WindowStyle Hidden
          if ($process.ExitCode -ne 64) {
            throw "Expected elevated helper exit code 64 for missing arguments, got $($process.ExitCode)."
          }

      - name: Upload elevated helper smoke diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: windows-elevated-helper-smoke-diagnostics
          path: ${{ runner.temp }}\elevated-helper-smoke\*
          if-no-files-found: ignore

  transport-benchmark:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: flutter pub get

      - name: Run transport benchmark suite
        run: |
          python tool/run_benchmark_suite.py \
            --only transport_pipeline \
            --skip-dart-tool

      - name: Compare against committed baseline
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          latest="$(ls -1d benchmarks/results/*/summary.json 2>/dev/null | sort -r | head -n 1)"
          if [ -z "$latest" ]; then
            echo "No benchmark summary produced; skipping baseline compare."
            exit 0
          fi
          python tool/compare_benchmark_summary.py \
            --baseline benchmarks/baseline/summary.json \
            --current "$latest" \
            --threshold 0.25

      - name: Upload benchmark artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: transport-benchmark-${{ github.run_id }}
          path: |
            benchmarks/results/**/*
          if-no-files-found: warn
