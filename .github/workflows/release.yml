name: Publish Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Short version, for example 1.6.6"
        required: true
        type: string
      build_number:
        description: "Build suffix used in pubspec.yaml"
        required: true
        type: string
        default: "1"
      run_tests:
        description: "Run flutter analyze and flutter test before publishing"
        required: true
        type: boolean
        default: true
      require_signing:
        description: "Fail if code signing certificate secrets are unavailable"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Publish as a prerelease"
        required: true
        type: boolean
        default: false
      dry_run:
        description: "Build and validate without committing, tagging, or publishing"
        required: true
        type: boolean
        default: false
      skip_authenticode_check:
        description: "Skip signtool verify gate (only for manual rebuilds without certificate)"
        required: false
        type: boolean
        default: false
      require_valid_update_signature:
        description: "Build with AUTO_UPDATE_REQUIRE_VALID_SIGNATURE=true (enforce Authenticode of installer+helper at runtime)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: publish-windows-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    env:
      VERSION_SHORT: ${{ inputs.version }}
      FULL_VERSION: ${{ inputs.version }}+${{ inputs.build_number }}
      RELEASE_TAG: v${{ inputs.version }}
      OFFICIAL_FEED_URL: https://cesar-carlos.github.io/plug_agente/appcast.xml
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Install Python dependencies
        run: python -m pip install --quiet "cryptography>=42.0.0"

      - name: Early release preflight
        shell: bash
        run: |
          ARGS=(--early --version "${{ env.VERSION_SHORT }}" --require-iscc --check-secrets)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--allow-existing-tag)
          fi
          python tool/release_preflight.py "${ARGS[@]}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Update pubspec version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          full_version = os.environ["FULL_VERSION"]
          if not re.fullmatch(r"\d+\.\d+\.\d+\+\d+", full_version):
              raise SystemExit(f"Invalid FULL_VERSION: {full_version}")

          pubspec = Path("pubspec.yaml")
          content = pubspec.read_text(encoding="utf-8")
          updated, replacements = re.subn(
              r'^version:\s*["\']?\d+\.\d+\.\d+(?:\+\d+)?["\']?\s*(?:#|$)',
              f"version: {full_version}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if replacements != 1:
              raise SystemExit("Unable to update pubspec.yaml version.")
          pubspec.write_text(updated, encoding="utf-8")

      - name: Synchronize version files
        run: python installer/update_version.py

      - name: Verify version synchronization
        shell: bash
        run: |
          ARGS=(--version "${{ env.VERSION_SHORT }}" --allow-dirty)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--allow-existing-tag)
          fi
          python tool/release_preflight.py "${ARGS[@]}"

      - name: Release quality gate
        if: inputs.run_tests
        run: python tool/release_preflight.py --gate --allow-dirty --allow-existing-tag

      - name: Prepare signing certificate
        id: signing
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERT_BASE64)) {
            "cert_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "plug-agente-code-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_BASE64))
          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Resolve Authenticode verification
        id: authenticode
        shell: pwsh
        env:
          CERT_PATH: ${{ steps.signing.outputs.cert_path }}
          REQUIRE_SIGNING: ${{ inputs.require_signing }}
          SKIP_INPUT: ${{ inputs.skip_authenticode_check }}
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace($env:CERT_PATH)
          $requireSigning = $env:REQUIRE_SIGNING -eq 'true'
          $skipInput = $env:SKIP_INPUT -eq 'true'
          if ($requireSigning -and -not $hasCert) {
            throw "require_signing=true but WINDOWS_CODE_SIGNING_CERT_BASE64 is not configured."
          }
          $skip = $skipInput -or -not $hasCert
          if (-not $hasCert -and -not $skipInput) {
            Write-Host "::warning::No code signing certificate configured; skipping Authenticode verification (unsigned build)."
          }
          "skip=$($skip.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer
        env:
          AUTO_UPDATE_FEED_URL: ${{ env.OFFICIAL_FEED_URL }}
          AUTO_UPDATE_CHANNEL: stable
          # Default false during the Authenticode rollout (plano fase 1E.2).
          # Flip the workflow input to true once helper+installer are signed
          # end-to-end and at least two release builds passed in the field.
          AUTO_UPDATE_REQUIRE_VALID_SIGNATURE: ${{ inputs.require_valid_update_signature }}
          AUTO_UPDATE_FEED_PUBLIC_KEY: ${{ secrets.AUTO_UPDATE_FEED_PUBLIC_KEY }}
          AUTO_UPDATE_REQUIRE_FEED_SIGNATURE: ${{ vars.AUTO_UPDATE_REQUIRE_FEED_SIGNATURE || 'false' }}
          WINDOWS_CODE_SIGNING_CERT_PATH: ${{ steps.signing.outputs.cert_path }}
          WINDOWS_CODE_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERT_PASSWORD }}
          WINDOWS_CODE_SIGNING_REQUIRED: ${{ inputs.require_signing || inputs.require_valid_update_signature }}
        run: python installer/build_installer.py

      - name: Validate generated installer
        env:
          AUTO_UPDATE_FEED_PUBLIC_KEY: ${{ secrets.AUTO_UPDATE_FEED_PUBLIC_KEY }}
        run: |
          python tool/release_preflight.py --version "${{ env.VERSION_SHORT }}" --allow-dirty --check-installer --allow-existing-tag --feed-public-key "$AUTO_UPDATE_FEED_PUBLIC_KEY"
        shell: bash

      - name: Verify Authenticode signatures
        if: steps.authenticode.outputs.skip != 'true'
        shell: pwsh
        env:
          INSTALLER_PATH: installer/dist/PlugAgente-Setup-${{ env.VERSION_SHORT }}.exe
        run: |
          $ErrorActionPreference = 'Stop'
          $installerPath = $env:INSTALLER_PATH
          if (-not (Test-Path $installerPath)) {
            throw "Installer not found at $installerPath"
          }

          # signtool ships with the Windows 10/11 SDK; the runner image has it
          # in the standard location. Resolve the most recent x64 build.
          $signtoolCandidates = @(
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe",
            "${env:ProgramFiles}\Windows Kits\10\bin\*\x64\signtool.exe"
          )
          $signtool = $null
          foreach ($pattern in $signtoolCandidates) {
            $candidate = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if ($candidate) { $signtool = $candidate.FullName; break }
          }
          if (-not $signtool) {
            throw "signtool.exe not found in Windows Kits."
          }
          Write-Host "Using signtool: $signtool"

          $helper = Join-Path $PWD "build\windows\x64\runner\Release\plug_update_helper.exe"
          if (-not (Test-Path $helper)) {
            throw "plug_update_helper.exe not found at $helper"
          }

          $exitInstaller = & $signtool verify /pa /v $installerPath
          if ($LASTEXITCODE -ne 0) {
            Write-Output $exitInstaller
            throw "signtool verify failed for installer ($installerPath)"
          }
          $exitHelper = & $signtool verify /pa /v $helper
          if ($LASTEXITCODE -ne 0) {
            Write-Output $exitHelper
            throw "signtool verify failed for plug_update_helper.exe ($helper)"
          }
          Write-Host "Authenticode verification passed for installer and helper."

      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml installer/setup.iss lib/core/constants/app_version.g.dart
          git diff --staged --quiet && {
            echo "No version changes to commit."
            exit 1
          }
          git commit -m "chore: bump version to ${VERSION_SHORT}"
          git push origin main

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        shell: bash
        # Prefer RELEASE_PUBLISH_TOKEN (PAT with `repo` scope) when the
        # secret is configured. GitHub does not propagate the
        # `release.published` webhook for releases created with the
        # default GITHUB_TOKEN, which means `update-appcast.yml` must be
        # dispatched manually for every new release. Using a PAT fixes
        # that and keeps the previous behavior as a fallback when the
        # secret is missing.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN || github.token }}
        run: |
          PRERELEASE_FLAG=""
          LATEST_FLAG="--latest"
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
            LATEST_FLAG="--latest=false"
          fi
          if [ -n "${{ secrets.RELEASE_PUBLISH_TOKEN }}" ]; then
            echo "Publishing release with RELEASE_PUBLISH_TOKEN (downstream workflows will trigger)."
          else
            echo "::warning::RELEASE_PUBLISH_TOKEN not configured; publishing with GITHUB_TOKEN. update-appcast.yml will NOT trigger automatically — dispatch it manually."
          fi
          gh release create "${RELEASE_TAG}" \
            "installer/dist/PlugAgente-Setup-${VERSION_SHORT}.exe" \
            --title "Version ${VERSION_SHORT}" \
            --generate-notes \
            --verify-tag \
            ${LATEST_FLAG} \
            ${PRERELEASE_FLAG}

      - name: Dispatch appcast update without PAT
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ secrets.RELEASE_PUBLISH_TOKEN }}" ]; then
            echo "RELEASE_PUBLISH_TOKEN is configured; appcast should update via release.published webhook."
            exit 0
          fi
          echo "::warning::RELEASE_PUBLISH_TOKEN not set; dispatching Update Appcast on Release."
          gh workflow run "Update Appcast on Release" --ref main \
            -f "release_tag=${RELEASE_TAG}" \
            -f rollout_percentage=100 \
            -f channel=stable

      - name: Dry run summary
        if: inputs.dry_run
        shell: bash
        run: |
          echo "Dry run completed for ${FULL_VERSION}."
          echo "Installer generated at installer/dist/PlugAgente-Setup-${VERSION_SHORT}.exe."
          echo "No commit, tag, or GitHub Release was created."
