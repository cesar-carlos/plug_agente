name: Validate Version Sync

on:
  push:
    branches: [main]
    paths:
      - 'pubspec.yaml'
      - 'installer/setup.iss'
      - 'lib/core/constants/app_version.g.dart'
  pull_request:
    paths:
      - 'pubspec.yaml'
      - 'installer/setup.iss'
      - 'lib/core/constants/app_version.g.dart'

jobs:
  validate-version-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate synced version files
        run: python installer/update_version.py

      - name: Validate committed files are synchronized
        run: |
          if git diff --quiet -- installer/setup.iss lib/core/constants/app_version.g.dart; then
            echo "Version files are synchronized."
          else
            echo "Error: installer/setup.iss and/or lib/core/constants/app_version.g.dart are out of sync with pubspec.yaml."
            echo "Run: python installer/update_version.py"
            echo "Then commit the generated changes before merging or tagging a release."
            git diff -- installer/setup.iss lib/core/constants/app_version.g.dart
            exit 1
          fi
