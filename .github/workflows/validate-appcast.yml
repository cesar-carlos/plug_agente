name: Validate Current Appcast

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      feed_url:
        description: "Sparkle feed URL to validate."
        required: false
        type: string
        default: "https://cesar-carlos.github.io/plug_agente/appcast.xml"
      max_items:
        description: "Maximum items allowed in the feed."
        required: false
        type: string
        default: "10"

jobs:
  validate-appcast:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run appcast tooling unit tests
        run: python3 -m unittest tool.test_appcast_manager tool.test_validate_release -v

      - name: Inspect current appcast
        env:
          FEED_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.feed_url || 'https://cesar-carlos.github.io/plug_agente/appcast.xml' }}
          MAX_APPCAST_ITEMS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_items || '10' }}
        run: |
          curl -L -sS "${FEED_URL}" -o published_appcast.xml
          python3 tool/appcast_manager.py inspect-url \
            --feed-url "${FEED_URL}" \
            --env-file appcast.env \
            --release-body-file release_body.txt \
            --max-items "${MAX_APPCAST_ITEMS}"

      - name: Smoke validate current appcast
        env:
          FEED_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.feed_url || 'https://cesar-carlos.github.io/plug_agente/appcast.xml' }}
          MAX_APPCAST_ITEMS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_items || '10' }}
        run: |
          source appcast.env
          python3 tool/appcast_manager.py smoke-validate-url \
            --feed-url "${FEED_URL}" \
            --version-short "${VERSION_SHORT}" \
            --full-version "${FULL_VERSION}" \
            --asset-url "${ASSET_URL}" \
            --asset-size "${ASSET_SIZE}" \
            --asset-sha256 "${ASSET_SHA256}" \
            --asset-name "${ASSET_NAME}" \
            --channel "${CHANNEL}" \
            --rollout-percentage "${ROLLOUT_PERCENTAGE}" \
            --release-body-file release_body.txt \
            --max-items "${MAX_APPCAST_ITEMS}" \
            --attempts 3 \
            --delay-seconds 5

      - name: Upload appcast diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: validate-appcast-diagnostics
          path: |
            published_appcast.xml
            appcast.env
            release_body.txt
          if-no-files-found: ignore
